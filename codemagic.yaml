workflows:
  android-workflow:
    name: SpeakPro Android
    max_build_duration: 60
    environment:
      node: 22.0.0
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync android
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
